name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-pages
  cancel-in-progress: true

env:
  CLOUDFLARE_PAGES_PROJECT: wwolff

jobs:
  deploy:
    runs-on: ubuntu-latest
    # The repo is mirrored to will-break-it.github.io; only deploy from the primary repo
    # to avoid a duplicate deploy when the same commit is pushed to both remotes.
    if: github.repository == 'will-break-it/will-break-it'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Assemble static site
        run: |
          rm -rf dist
          mkdir -p dist
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='README.md' \
            --exclude='master-cv.typ' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='dist' \
            ./ dist/
          echo "Files to deploy:"
          find dist -type f | sort

      - name: Resolve Cloudflare credentials
        run: |
          TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          ACCOUNT="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"

          if [ -z "$TOKEN" ]; then
            TOKEN="${{ vars.CLOUDFLARE_API_TOKEN }}"
          fi

          if [ -z "$ACCOUNT" ]; then
            ACCOUNT="${{ vars.CLOUDFLARE_ACCOUNT_ID }}"
          fi

          if [ -z "$TOKEN" ] || [ -z "$ACCOUNT" ]; then
            echo "::error::Missing Cloudflare credentials. Set CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID as repository secrets."
            exit 1
          fi

          echo "::add-mask::$TOKEN"
          echo "::add-mask::$ACCOUNT"
          echo "CF_API_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "CF_ACCOUNT_ID=$ACCOUNT" >> "$GITHUB_ENV"

      - name: Ensure Cloudflare Pages project exists
        run: |
          set +e
          OUTPUT=$(npx --yes wrangler pages project create "$PROJECT" --production-branch=main 2>&1)
          STATUS=$?
          set -e

          echo "$OUTPUT"

          if [ "$STATUS" -eq 0 ]; then
            echo "Pages project '$PROJECT' created."
            exit 0
          fi

          if echo "$OUTPUT" | grep -qi "already exists"; then
            echo "Pages project '$PROJECT' already exists. Continuing."
            exit 0
          fi

          echo "::error::Failed to create Pages project '$PROJECT'."
          exit "$STATUS"
        env:
          PROJECT: ${{ env.CLOUDFLARE_PAGES_PROJECT }}
          CLOUDFLARE_API_TOKEN: ${{ env.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CF_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: >-
          npx --yes wrangler pages deploy dist
          --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT }}
          --branch=${{ github.ref_name }}
          --commit-hash=${{ github.sha }}
          --commit-message="GitHub Actions deploy"
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CF_ACCOUNT_ID }}
