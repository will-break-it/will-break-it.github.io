name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize Pages deployments so overlapping pushes never collide
# (this is what fixes the "in progress deployment" race).
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    # Only the github.io mirror serves GitHub Pages; the primary repo deploys to Cloudflare.
    if: github.repository == 'will-break-it/will-break-it.github.io'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Assemble static site
        run: |
          rm -rf dist
          mkdir -p dist
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='README.md' \
            --exclude='master-cv.typ' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='dist' \
            ./ dist/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
